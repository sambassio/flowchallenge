# Vercel Hobby : cron limité à 1 fois / jour → rappels via GitHub Actions (gratuit).
# Repo → Settings → Secrets and variables → Actions → « CRON_SECRET »
# = même valeur que CRON_SECRET (Production) sur Vercel.

name: Reprogram — rappels Telegram (Paris)

on:
  workflow_dispatch:
  schedule:
    # 4 pings UTC/jour ; l’API n’envoie que si Paris = 14h ou 18h.
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Handler cron production
        run: |
          curl -sfS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://flowchallenge-alpha.vercel.app/api/cron/reprogram-telegram"
