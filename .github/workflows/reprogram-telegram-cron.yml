# Vercel Hobby : cron limité → rappels via GitHub Actions.
# Repo → Settings → Secrets → Actions → « CRON_SECRET » = Production Vercel.
# Ping toutes les 15 minutes pour couvrir les fuseaux (ex. ±30 min UTC).

name: Reprogram — rappels Telegram (13h / 21h locales)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Cron production → /api/cron/reprogram-telegram
        run: |
          curl -sfS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://flowchallenge-alpha.vercel.app/api/cron/reprogram-telegram"
